<html>
    <head>
        <title>

        </title>
    </head>
    <body>
        <input
        type="radio"
        name="category"
        id="shopping"
         />
         <input
        type="radio"
        name="category"
        id="market"
         />
        <button id="btnColor" style="background-color: red;">Call to action</button>

        <script>
        
        const radios = document.querySelectorAll('input[name="category"]');
        const btnChange = document.querySelector("#btnColor");

        radios.forEach((radio) => {
            radio.addEventListener('change', () => {
                btnChange.style.backgroundColor = "blue";
            })
        })
        

        </script>
    </body>
</html>
